name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.github/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.github/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
      - name: gitleaks
        run: docker run -v ${{ github.workspace }}:/repo ghcr.io/gitleaks/gitleaks:latest detect -c /repo/.gitleaks.toml -s /repo
        continue-on-error: true
      - name: Run RuboCop
        run: bundle exec rubocop --parallel

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kubera
          POSTGRES_PASSWORD: kubera
          POSTGRES_DB: kubera_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v7
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
      - name: Setup database
        env:
          DATABASE_URL: postgres://kubera:kubera@localhost:5432/kubera_test
          RAILS_ENV: test
        run: bin/rails db:create db:schema:load 2>&1
      - name: Precompile assets
        env:
          DATABASE_URL: postgres://kubera:kubera@localhost:5432/kubera_test
          RAILS_ENV: test
          SECRET_KEY_BASE: test_secret_key_base_for_ci
        run: bin/rails assets:precompile
      - name: Run RSpec
        env:
          DATABASE_URL: postgres://kubera:kubera@localhost:5432/kubera_test
          RAILS_ENV: test
          REDIS_URL: redis://localhost:6379/1
          SECRET_KEY_BASE: test_secret_key_base_for_ci
        run: bundle exec rspec
      - name: gitleaks
        run: docker run -v ${{ github.workspace }}:/repo ghcr.io/gitleaks/gitleaks:latest detect -c /repo/.gitleaks.toml -s /repo
        continue-on-error: true
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  validate-installer:
    name: Validate installer scripts
    runs-on: ubuntu-latest
    if: ${{ contains(github.event.head_commit.modified, 'install.sh') || contains(github.event.pull_request.changed_files, 'install.sh') }}
    steps:
      - uses: actions/checkout@v7
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: '.'
          additional_files: 'install.sh'
          severity: warning
      - name: Check bash syntax
        run: bash -n install.sh && echo "Syntax OK"
      - name: Validate compose file
        run: docker compose -f compose.yml config --quiet && echo "compose.yml valid"
