x-db-env: &db_env
  POSTGRES_USER: ${POSTGRES_USER:-kubera_user}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kubera_password}
  POSTGRES_DB: ${POSTGRES_DB:-kubera_production}

x-app-env: &app_env
  <<: *db_env
  SECRET_KEY_BASE: ${SECRET_KEY_BASE:-}
  RAILS_FORCE_SSL: "false"
  DB_HOST: db
  DB_PORT: 5432
  PORT: ${PORT:-3000}

  # AI Assistant — OpenAI-compatible API
  # Works with OpenRouter (free models at openrouter.ai), OpenAI, Anthropic, Ollama
  OPENAI_URI_BASE: ${OPENAI_URI_BASE:-https://openrouter.ai/api/v1}
  OPENAI_ACCESS_TOKEN: ${OPENAI_ACCESS_TOKEN:-}
  OPENAI_MODEL: ${OPENAI_MODEL:-google/gemini-2.0-flash-lite-001}

services:
  web:
    build: .
    image: kubera:latest
    restart: unless-stopped
    ports:
      - "${PORT:-3002}:3000"
    environment:
      <<: *app_env
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - app-storage:/rails/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - kubera_net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/up || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      <<: *db_env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kubera_user} -d ${POSTGRES_DB:-kubera_production}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - kubera_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - kubera_net

volumes:
  app-storage:
  postgres-data:
  redis-data:

networks:
  kubera_net:
    driver: bridge
