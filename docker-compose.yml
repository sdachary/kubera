services:
  app:
    build: .
    image: kubera:latest
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      RAILS_ENV: production
      DB_HOST: ${DB_HOST:-10.0.1.46}
      DB_PORT: ${DB_PORT:-5432}
      REDIS_URL: redis://${REDIS_HOST:-10.0.1.46}:6379/0
    volumes:
      - kubera-storage:/rails/storage

  sidekiq:
    image: kubera:latest
    restart: unless-stopped
    depends_on:
      - app
    command: ["bundle", "exec", "sidekiq"]
    env_file:
      - .env
    environment:
      RAILS_ENV: production
      DB_HOST: ${DB_HOST:-10.0.1.46}
      DB_PORT: ${DB_PORT:-5432}
      REDIS_URL: redis://${REDIS_HOST:-10.0.1.46}:6379/0
    volumes:
      - kubera-storage:/rails/storage

volumes:
  kubera-storage:
